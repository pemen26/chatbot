<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPC IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #212121;
      --sidebar: #171717;
      --surface: #2f2f2f;
      --surface-hover: #3a3a3a;
      --border: #3a3a3a;
      --text: #ececec;
      --text-muted: #8e8ea0;
      --accent: #c0392b;
      --accent-hover: #a93226;
      --input-bg: #2f2f2f;
      --radius: 12px;
      --font: 'Inter', system-ui, sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 260px;
      background: var(--sidebar);
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 4px;
      border-right: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 4px 16px;
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .logo-icon {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: white;
    }

    .new-chat-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
    }
    .new-chat-btn:hover { background: var(--surface); color: var(--text); }

    .sidebar-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 8px 8px 4px;
    }

    .history-list { display: flex; flex-direction: column; gap: 2px; flex: 1; overflow-y: auto; }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .history-item {
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13.5px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, color 0.15s;
      position: relative;
    }
    .history-item:hover { background: var(--surface); color: var(--text); }
    .history-item.active { background: var(--surface); color: var(--text); }

    .history-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-delete {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 4px;
      display: none;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
      padding: 0;
    }
    .history-item:hover .history-delete { display: flex; }
    .history-delete:hover { background: rgba(239,68,68,0.2); color: #f87171; }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      margin-top: 4px;
    }

    .powered {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      padding: 6px;
    }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .topbar {
      display: flex;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      color: var(--text-muted);
      gap: 8px;
      min-height: 56px;
    }

    .topbar-model {
      background: var(--surface);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }

    /* MESSAGES */
    .messages-wrapper { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    .messages-wrapper::-webkit-scrollbar { width: 6px; }
    .messages-wrapper::-webkit-scrollbar-track { background: transparent; }
    .messages-wrapper::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .messages-container {
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 24px 0;
      display: flex;
      flex-direction: column;
    }

    /* Welcome */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      padding: 32px;
      text-align: center;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .welcome-icon {
      width: 56px; height: 56px;
      background: var(--accent);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: white;
    }

    .welcome h1 { font-size: 26px; font-weight: 600; }
    .welcome p { font-size: 15px; color: var(--text-muted); max-width: 400px; line-height: 1.6; }

    .suggestions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 8px;
      width: 100%;
      max-width: 520px;
    }

    .suggestion-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      text-align: left;
      cursor: pointer;
      font-size: 13.5px;
      color: var(--text-muted);
      line-height: 1.5;
      font-family: var(--font);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .suggestion-card:hover { background: var(--surface-hover); border-color: var(--accent); color: var(--text); }
    .suggestion-card strong { display: block; color: var(--text); font-weight: 600; margin-bottom: 4px; font-size: 14px; }

    /* Messages */
    .message {
      padding: 20px 0;
      display: flex;
      gap: 16px;
      animation: fadeUp 0.2s ease;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .message + .message { border-top: 1px solid var(--border); }

    .message-avatar {
      width: 32px; height: 32px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      margin-top: 2px;
    }
    .message.user .message-avatar { background: #5436DA; color: white; }
    .message.assistant .message-avatar { background: var(--accent); color: white; }

    .message-content {
      flex: 1;
      font-size: 15px;
      line-height: 1.75;
      color: var(--text);
      min-width: 0;
    }
    .message-content p { margin-bottom: 12px; }
    .message-content p:last-child { margin-bottom: 0; }
    .message-content pre {
      background: #1a1a1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      margin: 12px 0;
      font-size: 13px;
      line-height: 1.5;
    }
    .message-content code { font-family: 'Courier New', monospace; font-size: 13px; }
    .message-content p code { background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; }
    .message-content ul, .message-content ol { padding-left: 20px; margin-bottom: 12px; }
    .message-content li { margin-bottom: 4px; }
    .message-content strong { font-weight: 600; }
    .message-content h1, .message-content h2, .message-content h3 { font-weight: 600; margin: 16px 0 8px; }

    /* Typing */
    .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: blink 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%,80%,100% { opacity:0.3; transform:scale(0.8); }
      40% { opacity:1; transform:scale(1); }
    }

    /* INPUT */
    .input-area { padding: 16px 24px 24px; }

    .input-wrapper {
      max-width: 760px;
      margin: 0 auto;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 12px 12px 12px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: rgba(16,163,127,0.5);
      box-shadow: 0 0 0 3px rgba(16,163,127,0.1);
    }

    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.6;
      resize: none;
      max-height: 200px;
      overflow-y: auto;
    }
    #user-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 34px; height: 34px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
      color: white;
    }
    .send-btn:hover { background: var(--accent-hover); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .input-footer {
      max-width: 760px;
      margin: 8px auto 0;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
    }

    .error-banner {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13.5px;
      margin-bottom: 10px;
      max-width: 760px;
      margin-left: auto;
      margin-right: auto;
      display: none;
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">K</div>
        KPC IA
      </div>
      <button class="new-chat-btn" id="new-chat-btn" title="Nouvelle conversation">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 5v14M5 12h14"/>
        </svg>
      </button>
    </div>

    <div class="sidebar-section-label">Historique</div>
    <div class="history-list" id="history-list"></div>

    <div class="sidebar-footer">
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div style="font-size:16px; font-weight:600; color:var(--text)">KPC IA</div>
    </div>

    <div class="messages-wrapper" id="messages-wrapper">
      <div class="welcome" id="welcome-screen">
        <div class="welcome-icon">K</div>
        <h1>Bonjour, je suis KPC IA !</h1>
        <p>Votre assistant IA intelligent. Comment puis-je vous aider aujourd'hui ?</p>
        <div class="suggestions">
          <button class="suggestion-card" data-prompt="Explique-moi comment fonctionne l'intelligence artificielle en termes simples.">
            <strong>🧠 Expliquer l'IA</strong>
            Comment fonctionne l'intelligence artificielle ?
          </button>
          <button class="suggestion-card" data-prompt="Ecris un programme Python qui affiche les nombres premiers jusqu'a 100.">
            <strong>💻 Coder</strong>
            Ecrire un programme en Python
          </button>
          <button class="suggestion-card" data-prompt="Quels sont les meilleurs conseils pour apprendre une nouvelle langue rapidement ?">
            <strong>📚 Apprendre</strong>
            Conseils pour apprendre vite
          </button>
          <button class="suggestion-card" data-prompt="Redige un email professionnel pour demander un entretien d'embauche.">
            <strong>✉️ Rediger</strong>
            Un email professionnel
          </button>
        </div>
      </div>

      <div class="messages-container" id="messages-container"></div>
    </div>

    <div class="input-area">
      <div class="error-banner" id="error-banner"></div>
      <div class="input-wrapper">
        <textarea id="user-input" placeholder="Envoyer un message à KPC IA..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/>
          </svg>
        </button>
      </div>
      <p class="input-footer">KPC IA peut faire des erreurs. Vérifiez les informations importantes.</p>
    </div>
  </main>

  <script>
    let conversations = JSON.parse(localStorage.getItem('kpc_conversations') || '[]');
    let currentConvId = null;
    let isLoading = false;

    const input = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const messagesContainer = document.getElementById('messages-container');
    const messagesWrapper = document.getElementById('messages-wrapper');
    const welcomeScreen = document.getElementById('welcome-screen');
    const historyList = document.getElementById('history-list');
    const newChatBtn = document.getElementById('new-chat-btn');
    const errorBanner = document.getElementById('error-banner');

    input.addEventListener('input', () => {
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 200) + 'px';
      sendBtn.disabled = input.value.trim() === '' || isLoading;
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (!sendBtn.disabled) sendMessage(); }
    });

    sendBtn.addEventListener('click', sendMessage);
    newChatBtn.addEventListener('click', startNewChat);

    document.querySelectorAll('.suggestion-card').forEach(card => {
      card.addEventListener('click', () => {
        input.value = card.dataset.prompt;
        input.dispatchEvent(new Event('input'));
        sendMessage();
      });
    });

    function startNewChat() {
      currentConvId = null;
      messagesContainer.innerHTML = '';
      welcomeScreen.style.display = 'flex';
      renderHistory();
    }

    function getOrCreateConversation() {
      if (currentConvId) return conversations.find(c => c.id === currentConvId);
      const conv = { id: Date.now().toString(), title: 'Nouvelle conversation', messages: [] };
      conversations.unshift(conv);
      currentConvId = conv.id;
      saveConversations();
      renderHistory();
      return conv;
    }

    function saveConversations() {
      conversations = conversations.slice(0, 30);
      localStorage.setItem('kpc_conversations', JSON.stringify(conversations));
    }

    function renderHistory() {
      historyList.innerHTML = '';
      conversations.forEach(conv => {
        const item = document.createElement('div');
        item.className = 'history-item' + (conv.id === currentConvId ? ' active' : '');

        const title = document.createElement('span');
        title.className = 'history-item-title';
        title.textContent = conv.title;
        title.addEventListener('click', () => loadConversation(conv.id));

        const delBtn = document.createElement('button');
        delBtn.className = 'history-delete';
        delBtn.title = 'Supprimer';
        delBtn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
        delBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          deleteConversation(conv.id);
        });

        item.appendChild(title);
        item.appendChild(delBtn);
        historyList.appendChild(item);
      });
    }

    function deleteConversation(id) {
      conversations = conversations.filter(c => c.id !== id);
      if (currentConvId === id) {
        currentConvId = null;
        messagesContainer.innerHTML = '';
        welcomeScreen.style.display = 'flex';
      }
      saveConversations();
      renderHistory();
    }

    function loadConversation(id) {
      const conv = conversations.find(c => c.id === id);
      if (!conv) return;
      currentConvId = id;
      messagesContainer.innerHTML = '';
      welcomeScreen.style.display = 'none';
      conv.messages.forEach(msg => appendMessage(msg.role, msg.content, false));
      renderHistory();
      scrollToBottom();
    }

    function appendMessage(role, content, animate = true) {
      const msg = document.createElement('div');
      msg.className = 'message ' + role;
      if (!animate) msg.style.animation = 'none';

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = role === 'user' ? 'U' : 'K';

      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = formatMessage(content);

      msg.appendChild(avatar);
      msg.appendChild(contentDiv);
      messagesContainer.appendChild(msg);
      if (animate) scrollToBottom();
      return contentDiv;
    }

    function formatMessage(text) {
      return text
        .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>')
        .split('\n\n')
        .map(p => p.startsWith('<') ? p : '<p>' + p.replace(/\n/g, '<br>') + '</p>')
        .join('');
    }

    function showTyping() {
      const msg = document.createElement('div');
      msg.className = 'message assistant';
      msg.id = 'typing-msg';
      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = 'K';
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
      msg.appendChild(avatar);
      msg.appendChild(contentDiv);
      messagesContainer.appendChild(msg);
      scrollToBottom();
    }

    function removeTyping() {
      document.getElementById('typing-msg')?.remove();
    }

    function showError(msg) {
      errorBanner.textContent = msg;
      errorBanner.style.display = 'block';
      setTimeout(() => errorBanner.style.display = 'none', 6000);
    }

    function scrollToBottom() {
      setTimeout(() => messagesWrapper.scrollTo({ top: messagesWrapper.scrollHeight, behavior: 'smooth' }), 50);
    }

    async function sendMessage() {
      const text = input.value.trim();
      if (!text || isLoading) return;

      welcomeScreen.style.display = 'none';
      const conv = getOrCreateConversation();
      conv.messages.push({ role: 'user', content: text });
      if (conv.messages.length === 1) conv.title = text.slice(0, 45) + (text.length > 45 ? '...' : '');
      saveConversations();
      renderHistory();

      appendMessage('user', text);
      input.value = '';
      input.style.height = 'auto';
      sendBtn.disabled = true;
      isLoading = true;
      showTyping();

      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
          messages: conv.messages.map(m => ({ role: m.role, content: m.content })),
          allHistory: conversations
            .filter(c => c.id !== currentConvId)
            .slice(0, 1) // seulement la conversation précédente
            .flatMap(c => c.messages)
            .slice(-6), // max 6 derniers messages de cette conv
        }),
        });

        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Erreur');

        removeTyping();
        conv.messages.push({ role: 'assistant', content: data.reply });
        saveConversations();
        appendMessage('assistant', data.reply);

      } catch (err) {
        removeTyping();
        showError('❌ ' + (err.message || 'Erreur de connexion'));
        conv.messages.pop();
        saveConversations();
      } finally {
        isLoading = false;
        sendBtn.disabled = input.value.trim() === '';
      }
    }

    renderHistory();
  </script>
</body>
</html>
